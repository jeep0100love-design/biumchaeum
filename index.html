<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#dff4ff" />
  <title>비움과채움</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand-mark">☁️</div>
    <div>
      <h1>비움과채움</h1>
      <p>편안하게 예약하고, 따뜻하게 채워드려요 💙</p>
    </div>
    <button id="adminBtn" class="icon-btn" aria-label="관리자">⚙️</button>
  </header>

  <div class="ticker" aria-label="안내">
    <div class="ticker-track">예약 전 전화 확인 부탁드립니다 · 공릉동에서는 위치가 태릉입구역으로 표시됩니다 · 작업 완료 즉시 예약 가능 상태로 전환됩니다</div>
  </div>

  <main>
    <section class="map-wrap">
      <div id="map"></div>
      <article id="statusCard" class="status-card">
        <div>
          <small>오늘의 상태</small>
          <h2 id="statusTitle">😊 지금 가능</h2>
          <p id="statusLocation">📍 태릉입구역 부근 대기중</p>
        </div>
        <span id="statusLive" class="live-pill">LIVE</span>
      </article>
      <button id="statusBadge" class="status-badge hidden">😊 가능</button>
    </section>

    <section class="controls card">
      <button id="workStartBtn" class="primary">출근</button>
      <button id="workEndBtn">퇴근</button>
      <button id="completeBtn" class="success">작업 완료</button>
    </section>

    <section class="card">
      <div class="section-head">
        <h2 id="todayLabel">오늘</h2>
        <button id="resetTodayBtn" class="text-btn">오늘 예약 초기화</button>
      </div>
      <div id="slots" class="slots"></div>
    </section>

    <section class="card">
      <h2>예약하기</h2>
      <form id="bookingForm">
        <label>이름<input id="name" required placeholder="홍길동" /></label>
        <label>연락처<input id="phone" required inputmode="tel" placeholder="010-0000-0000" /></label>
        <label>동네<input id="area" required placeholder="공릉동" /></label>
        <label>작업 내용<input id="job" required placeholder="정리, 수거, 청소 등" /></label>
        <label>시간<select id="time" required></select></label>
        <button class="primary full" type="submit">예약 등록</button>
      </form>
      <p id="formMessage" class="message" role="status"></p>
    </section>
  </main>

  <dialog id="adminDialog">
    <form method="dialog" id="adminLoginForm" class="dialog-card">
      <h2>관리자</h2>
      <label>비밀번호<input id="adminPassword" type="password" inputmode="numeric" /></label>
      <div class="dialog-actions">
        <button value="cancel">닫기</button>
        <button id="adminLoginBtn" value="default" class="primary">확인</button>
      </div>
      <p id="adminMessage" class="message"></p>
    </form>
  </dialog>

  <dialog id="adminPanel">
    <div class="dialog-card">
      <div class="section-head"><h2>예약 관리</h2><button id="adminCloseBtn">닫기</button></div>
      <div id="adminBookings"></div>
    </div>
  </dialog>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="./app.js"></script>
</body>
</html>
