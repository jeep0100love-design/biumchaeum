<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#bfe8ff" />
  <title>비움과채움</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="logo">☁️</div>
      <div>
        <h1>비움과채움</h1>
        <p>편안하게 예약하고, 따뜻하게 채워드려요 💙</p>
      </div>
    </header>

    <section class="card status-card">
      <div>
        <span class="eyebrow">오늘의 상태</span>
        <h2 id="shopStatus">😊 예약 가능</h2>
        <p id="locationText">📍 위치 공유가 꺼져 있습니다.</p>
      </div>
      <span id="liveBadge" class="badge off">OFF</span>
    </section>

    <section class="card">
      <h2>예약하기</h2>
      <div class="grid">
        <label>이름<input id="customerName" placeholder="홍길동" /></label>
        <label>연락처<input id="customerPhone" placeholder="010-0000-0000" inputmode="tel" /></label>
        <label>동네<input id="customerDong" placeholder="공릉동" /></label>
        <label>날짜<input id="reserveDate" type="date" /></label>
        <label>시간
          <select id="reserveTime"></select>
        </label>
        <label class="wide">요청사항<textarea id="memo" placeholder="남기실 말씀이 있으면 적어주세요."></textarea></label>
      </div>
      <button id="reserveBtn" class="primary">예약 신청하기 😊</button>
      <p class="hint">예약은 관리자 확인 후 최종 확정됩니다.</p>
    </section>

    <section class="card">
      <h2>현재 위치 안내</h2>
      <div id="map"></div>
      <p class="hint">공릉동 안에서는 실제 위치 대신 태릉입구역으로 표시됩니다.</p>
    </section>

    <section class="card admin-card">
      <div class="section-title">
        <h2>관리자</h2>
        <button id="adminLoginBtn" class="small">관리자 열기</button>
      </div>

      <div id="adminPanel" class="hidden">
        <div class="admin-actions">
          <button id="startWorkBtn" class="success">🟢 출근 · 위치 공유 시작</button>
          <button id="stopWorkBtn" class="danger">🔴 퇴근 · 위치 공유 종료</button>
          <button id="toggleBookingBtn" class="secondary">예약 가능/불가 변경</button>
        </div>

        <h3>예약 목록</h3>
        <div id="reservationList" class="reservation-list"></div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <dialog id="editDialog">
    <form method="dialog" id="editForm">
      <h2>예약 수정</h2>
      <input type="hidden" id="editId" />
      <label>이름<input id="editName" /></label>
      <label>연락처<input id="editPhone" /></label>
      <label>동네<input id="editDong" /></label>
      <label>날짜<input id="editDate" type="date" /></label>
      <label>시간<select id="editTime"></select></label>
      <label>상태
        <select id="editStatus">
          <option value="신청">신청</option>
          <option value="확정">확정</option>
          <option value="완료">완료</option>
          <option value="취소">취소</option>
        </select>
      </label>
      <label>요청사항<textarea id="editMemo"></textarea></label>
      <div class="dialog-actions">
        <button value="cancel" class="secondary">닫기</button>
        <button id="saveEditBtn" value="default" class="primary">저장</button>
      </div>
    </form>
  </dialog>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
